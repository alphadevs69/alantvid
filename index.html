<script>
/* Tombol Get App:
   - Android: coba buka OTT Navigator jika sudah terinstal.
   - Jika belum terinstal / gagal dibuka: otomatis fallback download APK.
   - Fitur lain tetap memakai script.js seperti sebelumnya.
*/
(function () {
  const APK_URL = "https://alantvid.pages.dev/app.apk";
  const PACKAGE_NAME = "studio.scillarium.ottnavigator";

  function isAndroid() {
    return /Android/i.test(navigator.userAgent);
  }

  function openOrDownload(e) {
    e.preventDefault();

    // Desktop / non-Android langsung download APK
    if (!isAndroid()) {
      window.location.href = APK_URL;
      return;
    }

    let opened = false;

    const fallbackTimer = setTimeout(function () {
      if (!opened && !document.hidden) {
        window.location.href = APK_URL;
      }
    }, 1400);

    function markOpened() {
      opened = true;
      clearTimeout(fallbackTimer);
      window.removeEventListener("pagehide", markOpened);
      document.removeEventListener("visibilitychange", onVisibilityChange);
    }

    function onVisibilityChange() {
      if (document.hidden) markOpened();
    }

    window.addEventListener("pagehide", markOpened);
    document.addEventListener("visibilitychange", onVisibilityChange);

    // Cara paling aman dari browser Android: buka package via intent.
    // Jika aplikasi belum ada, browser akan tetap di halaman lalu fallback download APK.
    window.location.href =
      "intent://launch/#Intent;scheme=ottnavigator;package=" +
      PACKAGE_NAME +
      ";end";
  }

  window.addEventListener("DOMContentLoaded", function () {
    const appBtn = document.getElementById("appBtn");
    if (!appBtn) return;

    appBtn.href = APK_URL;
    appBtn.addEventListener("click", openOrDownload);
  });
})();
</script>
